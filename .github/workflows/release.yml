name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: Build — ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # Apple Silicon (M-series)
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-13        # Intel Mac
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            experimental: true  # not yet smoke-tested end-to-end

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Go (required for go-libp2p-daemon build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false   # no go.sum in this repo; avoids a noisy cache-miss warning

      - name: Install OpenSSL (Linux — needed by webauthn-rs)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            core/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Ensure core/target/release exists
        # build.rs writes p2pd to this fixed path regardless of --target.
        # Cargo does not create target/release/ when --target is specified,
        # so go build in build.rs would fail on a cold run without this.
        shell: bash
        run: mkdir -p core/target/release

      - name: Build kwaainet
        working-directory: core
        run: cargo build --release -p kwaai-cli --target ${{ matrix.target }}

      - name: Build p2pd (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          git clone --depth 1 --branch v0.5.0.hivemind1 \
            https://github.com/learning-at-home/go-libp2p-daemon.git /tmp/go-libp2p-daemon
          cd /tmp/go-libp2p-daemon
          go build -o /tmp/p2pd ./p2pd

      - name: Build p2pd (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          git clone --depth 1 --branch v0.5.0.hivemind1 `
            https://github.com/learning-at-home/go-libp2p-daemon.git $env:TEMP\go-libp2p-daemon
          cd $env:TEMP\go-libp2p-daemon
          go build -o $env:TEMP\p2pd.exe ./p2pd

      - name: Package (tar.gz — macOS / Linux)
        if: matrix.archive == 'tar.gz'
        run: |
          BIN=core/target/${{ matrix.target }}/release/kwaainet
          ARCHIVE=kwaainet-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          ALIAS=kwaainet-${{ matrix.target }}.tar.gz
          mkdir -p /tmp/release-staging
          cp "$BIN" /tmp/release-staging/kwaainet
          cp /tmp/p2pd /tmp/release-staging/p2pd
          tar -czf "$ARCHIVE" -C /tmp/release-staging kwaainet p2pd
          cp "$ARCHIVE" "$ALIAS"
          echo "ASSET_VERSIONED=$ARCHIVE" >> "$GITHUB_ENV"
          echo "ASSET_ALIAS=$ALIAS" >> "$GITHUB_ENV"

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $bin   = "core/target/${{ matrix.target }}/release/kwaainet.exe"
          $p2pd  = "$env:TEMP\p2pd.exe"
          $out   = "kwaainet-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $alias = "kwaainet-${{ matrix.target }}.zip"
          Compress-Archive -Path $bin,$p2pd -DestinationPath $out
          Copy-Item $out $alias
          echo "ASSET_VERSIONED=$out" >> $env:GITHUB_ENV
          echo "ASSET_ALIAS=$alias" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_VERSIONED }}
            ${{ env.ASSET_ALIAS }}

  docker:
    name: Docker — summit-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kwaai-ai-lab/kwaainet/summit-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.summit-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
