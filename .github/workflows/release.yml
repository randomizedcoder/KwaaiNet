#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.
#
# NOTE: The Cargo workspace lives in core/ (not the repo root).
# All `dist` run steps use `working-directory: core` so that dist can locate
# the workspace via `cargo metadata`.  Artifact paths in `uses:` steps are
# adjusted accordingly (prefixed with `core/` or made absolute).

name: Release
permissions:
  "contents": "write"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.10)'
        required: true

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        working-directory: core
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: core/plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Use an absolute path so the path is consistent between run: steps
      # (which execute from core/) and uses: steps (which use the repo root).
      BUILD_MANIFEST_NAME: ${{ github.workspace }}/core/target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Go is required by the kwaai-p2p-daemon build.rs which clones and
      # compiles go-libp2p-daemon.  The old handwritten workflow had an
      # explicit setup-go step; cargo-dist doesn't know about it.
      - name: Install Go (required by kwaai-p2p-daemon build script)
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      # build.rs writes p2pd to target/release/ (hardcoded) regardless of
      # --target.  Cargo only creates target/<triple>/release/ when --target
      # is given, so target/release/ must be created manually.
      - name: Create target/release for kwaai-p2p-daemon build script
        shell: bash
        run: mkdir -p core/target/release
      # OpenSSL headers are needed by openssl-sys (transitive via reqwest/libp2p).
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libssl-dev pkg-config
      # On Windows, point openssl-sys at the pre-installed OpenSSL.
      - name: Set OpenSSL paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = Get-ChildItem "C:\Program Files" -Filter "OpenSSL*" -ErrorAction SilentlyContinue |
                 Select-Object -First 1 -ExpandProperty FullName
          if ($dir) {
            echo "OPENSSL_DIR=$dir" >> $env:GITHUB_ENV
          }
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: core/target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        working-directory: core
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      # cargo-dist publishes extra-artifacts (p2pd) as separate top-level release
      # assets, not bundled in the per-platform .tar.xz/.zip archives.  Inject
      # p2pd into each archive so the installer places both binaries side-by-side
      # in ~/.cargo/bin/ and kwaainet can find p2pd at runtime.
      - name: Inject p2pd into platform archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: core
        run: |
          P2PD=$(find . -name "p2pd" -type f 2>/dev/null \
            | grep -v "\.dSYM" | grep -v "/go-libp2p-daemon/" | head -1)
          if [ -z "${P2PD}" ]; then
            echo "p2pd not found — skipping injection"
            exit 0
          fi
          echo "Found p2pd at: ${P2PD}"
          for TARGET in ${{ join(matrix.targets, ' ') }}; do
            ARCHIVE=$(find . -name "kwaainet-${TARGET}.tar.xz" 2>/dev/null | head -1)
            [ -n "${ARCHIVE}" ] || { echo "Archive for ${TARGET} not found"; continue; }
            OLD_HASH=$(openssl dgst -sha256 -hex "${ARCHIVE}" | awk '{print $NF}')
            echo "Injecting p2pd into ${ARCHIVE} (old hash: ${OLD_HASH})..."
            LABEL="kwaainet-${TARGET}"
            TMP=$(mktemp -d)
            tar -xJf "${ARCHIVE}" -C "${TMP}"
            cp "${P2PD}" "${TMP}/${LABEL}/p2pd"
            chmod +x "${TMP}/${LABEL}/p2pd"
            tar -cJf "${ARCHIVE}" -C "${TMP}" "${LABEL}"
            rm -rf "${TMP}"
            NEW_HASH=$(openssl dgst -sha256 -hex "${ARCHIVE}" | awk '{print $NF}')
            echo "${NEW_HASH} *$(basename ${ARCHIVE})" > "${ARCHIVE}.sha256"
            # Patch dist-manifest.json so the global step embeds the correct
            # post-injection checksum in the generated installer script.
            if [ -f "dist-manifest.json" ]; then
              python3 -c "c=open('dist-manifest.json').read();open('dist-manifest.json','w').write(c.replace('${OLD_HASH}','${NEW_HASH}'))"
              echo "Patched manifest: ${OLD_HASH} -> ${NEW_HASH}"
            fi
            echo "Done: $(ls -lh ${ARCHIVE})"
          done

      - name: Inject p2pd into platform archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: core
        run: |
          $p2pd = Get-ChildItem -Recurse -Filter "p2pd.exe" -ErrorAction SilentlyContinue `
            | Where-Object { $_.FullName -notmatch "go-libp2p-daemon" } `
            | Select-Object -First 1
          if (-not $p2pd) {
            Write-Host "p2pd.exe not found — skipping injection"; exit 0
          }
          Write-Host "Found p2pd.exe at: $($p2pd.FullName)"
          foreach ($TARGET in "${{ join(matrix.targets, ' ') }}".Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {
            $archive = Get-ChildItem -Recurse -Filter "kwaainet-${TARGET}.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $archive) { Write-Host "Archive for ${TARGET} not found"; continue }
            $oldHash = (Get-FileHash $archive.FullName -Algorithm SHA256).Hash.ToLower()
            Write-Host "Injecting p2pd.exe into $($archive.FullName) (old hash: $oldHash)..."
            $tmp = New-Item -ItemType Directory -Path (Join-Path ([System.IO.Path]::GetTempPath()) ([System.IO.Path]::GetRandomFileName()))
            Expand-Archive -Path $archive.FullName -DestinationPath $tmp.FullName -Force
            Copy-Item $p2pd.FullName (Join-Path $tmp.FullName "p2pd.exe")
            Remove-Item $archive.FullName -Force
            Compress-Archive -Path (Join-Path $tmp.FullName "*") -DestinationPath $archive.FullName
            $newHash = (Get-FileHash $archive.FullName -Algorithm SHA256).Hash.ToLower()
            Set-Content "$($archive.FullName).sha256" "$newHash *kwaainet-${TARGET}.zip"
            Remove-Item $tmp.FullName -Recurse -Force
            # Patch dist-manifest.json with the post-injection checksum
            if (Test-Path "dist-manifest.json") {
              $c = Get-Content "dist-manifest.json" -Raw
              $c = $c -replace $oldHash, $newHash
              Set-Content "dist-manifest.json" $c
              Write-Host "Patched manifest: $oldHash -> $newHash"
            }
            Write-Host "Done."
          }

      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        working-directory: core
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: ${{ github.workspace }}/core/target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: core/target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        working-directory: core
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Patch installers to also install p2pd alongside kwaainet.
          # dist outputs installers to target/distrib/ (the artifact staging dir).
          # The shell installer iterates space-separated $_bins; add p2pd for all Unix targets.
          # The PS1 installer uses a PowerShell array; add p2pd.exe for Windows.
          if [ -f "target/distrib/kwaainet-installer.sh" ]; then
            sed -i 's/_bins="kwaainet"/_bins="kwaainet p2pd"/g' target/distrib/kwaainet-installer.sh
            echo "Patched kwaainet-installer.sh: p2pd added to _bins"
          else
            echo "WARNING: kwaainet-installer.sh not found at target/distrib/"
            find . -name "kwaainet-installer.sh" 2>/dev/null
          fi
          if [ -f "target/distrib/kwaainet-installer.ps1" ]; then
            sed -i 's/"bins" = @("kwaainet.exe")/"bins" = @("kwaainet.exe", "p2pd.exe")/g' target/distrib/kwaainet-installer.ps1
            echo "Patched kwaainet-installer.ps1: p2pd.exe added to bins array"
          else
            echo "WARNING: kwaainet-installer.ps1 not found at target/distrib/"
            find . -name "kwaainet-installer.ps1" 2>/dev/null
          fi

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: core/target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        working-directory: core
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: core/dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  publish-homebrew-formula:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
      GITHUB_USER: "axo bot"
      GITHUB_EMAIL: "admin+bot@axo.dev"
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true
          repository: "Kwaai-AI-Lab/homebrew-tap"
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # So we have access to the formula
      - name: Fetch homebrew formulae
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: Formula/
          merge-multiple: true
      # This is extra complex because you can make your Formula name not match your app name
      # so we need to find releases with a *.rb file, and publish with that filename.
      - name: Commit formula files
        run: |
          git config --global user.name "${GITHUB_USER}"
          git config --global user.email "${GITHUB_EMAIL}"

          for release in $(echo "$PLAN" | jq --compact-output '.releases[] | select([.artifacts[] | endswith(".rb")] | any)'); do
            filename=$(echo "$release" | jq '.artifacts[] | select(endswith(".rb"))' --raw-output)
            name=$(echo "$filename" | sed "s/\.rb$//")
            version=$(echo "$release" | jq .app_version --raw-output)

            export PATH="/home/linuxbrew/.linuxbrew/bin:$PATH"
            brew update
            # We avoid reformatting user-provided data such as the app description and homepage.
            brew style --except-cops FormulaAudit/Homepage,FormulaAudit/Desc,FormulaAuditStrict --fix "Formula/${filename}" || true

            git add "Formula/${filename}"
            git commit -m "${name} ${version}"
          done
          git push

  publish-crates:
    needs:
      - plan
      - host
    runs-on: "ubuntu-22.04"
    # Non-blocking: missing CARGO_REGISTRY_TOKEN or transient failures won't
    # block the announce job.  Set the CARGO_REGISTRY_TOKEN repo secret to
    # enable actual publishing to crates.io.
    continue-on-error: true
    if: ${{ !fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases }}
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install OpenSSL
        run: sudo apt-get update -q && sudo apt-get install -y -q libssl-dev pkg-config
      - name: Publish crates to crates.io
        working-directory: core
        run: |
          # Ordered by dependency: leaves first, dependents last.
          # kwaai-inference and kwaai-p2p-daemon have no internal deps and must
          # precede kwaai-distributed (which depends on kwaai-inference).
          for crate in \
            kwaai-compression \
            kwaai-trust \
            kwaai-p2p \
            kwaai-hivemind-dht \
            kwaai-inference \
            kwaai-p2p-daemon \
            kwaai-distributed \
            kwaai-wasm \
            kwaainet; do
            echo "=== publishing ${crate} ==="
            out=$(cargo publish -p "${crate}" 2>&1) && echo "$out" && { echo "waiting for crates.io index..."; sleep 30; } || {
              if echo "$out" | grep -qE "already uploaded|already exists on crates"; then
                echo "=== ${crate} already uploaded, skipping ==="
              else
                echo "$out" >&2; exit 1
              fi
            }
          done

  announce:
    needs:
      - plan
      - host
      - publish-homebrew-formula
      - publish-crates
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' && (needs.publish-homebrew-formula.result == 'skipped' || needs.publish-homebrew-formula.result == 'success') && (needs.publish-crates.result == 'skipped' || needs.publish-crates.result == 'success') }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

