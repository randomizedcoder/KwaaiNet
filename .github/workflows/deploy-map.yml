name: Deploy map.kwaai.ai

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
    paths:
      - 'apps/map/**'
      - 'core/crates/map-server/**'
      - 'docker/map-nginx.conf'
      - 'Dockerfile.map-server'
      - 'Dockerfile.map-frontend'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/kwaai-ai-lab/map-server
  FRONTEND_IMAGE: ghcr.io/kwaai-ai-lab/map-frontend

jobs:
  build-server:
    name: Build map-server image
    runs-on: ubuntu-22.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push map-server
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.map-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build map-frontend image
    runs-on: ubuntu-22.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push map-frontend
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.map-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to map.kwaai.ai ──────────────────────────────────────────────────
  # Requires secrets: MAP_SSH_HOST, MAP_SSH_USER, MAP_SSH_KEY
  # Set MAP_SSH_HOST to the production server's IP or hostname.
  # The server must have docker + docker compose installed and a
  # docker-compose.map.yml checked out at ~/kwaainet/.
  deploy:
    name: Deploy to map.kwaai.ai
    needs: [build-server, build-frontend]
    runs-on: ubuntu-22.04
    # Only deploy on tag pushes, not on every path-filtered push to main
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: map-production
      url: https://map.kwaai.ai
    steps:
      - name: Check deploy secrets
        id: check
        run: |
          if [ -z "${{ secrets.MAP_SSH_HOST }}" ]; then
            echo "MAP_SSH_HOST not set — skipping SSH deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAP_SSH_HOST }}
          username: ${{ secrets.MAP_SSH_USER }}
          key: ${{ secrets.MAP_SSH_KEY }}
          script: |
            set -e
            cd ~/kwaainet
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.SERVER_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest
            docker compose -f docker-compose.map.yml up -d --no-build
            docker image prune -f
            echo "Deployed map.kwaai.ai $(date -u)"

      - name: Skip notice
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "::notice::SSH deploy skipped — set MAP_SSH_HOST, MAP_SSH_USER, MAP_SSH_KEY secrets to enable automatic deployment."
          echo "Images pushed to GHCR and ready to pull manually:"
          echo "  ${{ env.SERVER_IMAGE }}:latest"
          echo "  ${{ env.FRONTEND_IMAGE }}:latest"
